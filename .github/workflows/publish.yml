name: Publish article

# 무인 자동 발행: 매일 1회 + 수동 실행. 글을 생성해 커밋하면 Vercel이 자동 배포.
on:
  schedule:
    - cron: '0 0 * * *' # 매일 09:00 KST (UTC 00:00)
  workflow_dispatch:
    inputs:
      category:
        description: '강제 카테고리 (money | ai, 비우면 자동)'
        required: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        working-directory: automation
        run: npm install
      - name: Generate article
        working-directory: automation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}
          IMAGE_PROVIDER: ${{ vars.IMAGE_PROVIDER || 'openai' }}
          WRITE_MODEL: ${{ vars.WRITE_MODEL }}
          RESEARCH_MODEL: ${{ vars.RESEARCH_MODEL }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: node run.js --no-poll ${{ github.event.inputs.category && format('--category={0}', github.event.inputs.category) || '' }}
      - name: Commit & push
        run: |
          git config user.name "crama-bot"
          git config user.email "bot@crama.app"
          git add -A
          git commit -m "post: automated article ($(date +%F))" || echo "변경 없음"
          git push

      # 배포 후 자동 색인: Vercel 빌드가 끝나 URL 이 실제 200 으로 뜬 뒤에만 IndexNow(네이버·빙·얀덱스) 제출.
      # (배포 전에 쏘면 404 가 푸시되므로 라이브 확인될 때까지 폴링)
      - name: Ping IndexNow + Web Push after deploy
        working-directory: automation
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ vars.VAPID_SUBJECT || 'mailto:gmlthd94@gmail.com' }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          URL=$(cat last-url.txt 2>/dev/null || true)
          if [ -z "$URL" ]; then echo "발행 URL 없음 — 스킵"; exit 0; fi
          echo "Vercel 배포 대기: $URL"
          live=0
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$URL" || echo 000)
            if [ "$code" = "200" ]; then live=1; echo "라이브 확인 ($code)"; break; fi
            echo "  대기 중 ($code) ${i}/30…"; sleep 20
          done
          if [ "$live" = "1" ]; then
            node indexnow.js "$URL"
            node send-brief.js || echo "푸시 발송 스킵/실패(글은 정상)"
          else
            echo "타임아웃(10분) — 색인/푸시 스킵"
          fi
