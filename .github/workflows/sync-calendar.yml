name: Sync policy calendar

# 청약홈 등 공공 API 실데이터를 매일 받아 policy-events.json 갱신 → 변경 시 커밋(→ Vercel 자동 배포).
# GitHub 서버에서 실행되므로 사용자 컴퓨터가 꺼져 있어도 캘린더가 최신 유지된다.
# 순수 Node(내장 fetch)만 쓰므로 npm install 불필요.
on:
  schedule:
    - cron: '0 21 * * *'   # 06:00 KST 매일 (글 발행 크론보다 앞)
  workflow_dispatch:        # 수동 실행 가능

permissions:
  contents: write

concurrency:
  group: sync-calendar
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 청약홈 일정 수집 → policy-events.json
        working-directory: automation
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          BIZINFO_KEY: ${{ secrets.BIZINFO_KEY }}
        run: node sync-policies.js

      - name: 온통청년 정책 수집 → youth-policies.json
        working-directory: automation
        env:
          ONTONG_YOUTH_KEY: ${{ secrets.ONTONG_YOUTH_KEY }}
        run: node sync-youth.js

      - name: 중앙부처 복지서비스 수집 → welfare-services.json
        working-directory: automation
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        run: node sync-welfare.js

      - name: 지자체 복지서비스 수집 → public/data/welfare-local.json
        working-directory: automation
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        run: node sync-welfare-local.js

      - name: 변경 시에만 커밋·푸시
        run: |
          git config user.name "crama-bot"
          git config user.email "bot@crama.app"
          git add site/src/data/policy-events.json site/src/data/youth-policies.json site/src/data/welfare-services.json site/public/data/welfare-local.json site/public/data/youth-slim.json site/public/data/welfare-local-slim.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 스킵"
          else
            git commit -m "chore(data): 공공 API 자동 갱신 — 청약·청년정책 ($(date -u +%F))"
            git pull --rebase --autostash origin main || true
            git push
            echo "청약 일정 갱신 커밋·푸시 완료"
          fi
